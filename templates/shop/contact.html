{% extends 'layouts/base.html' %}

{% block title %}Contact Us | Seth Sanwara Jewellers{% endblock %}

{% block content %}
<div class="container section-padding" style="margin-top: 60px;">
    <h1 class="section-title">Get in Touch</h1>

    <div class="contact-wrapper">
        <div class="contact-form">
            <h3 style="margin-bottom: 2rem; font-size: 1.8rem; color: var(--secondary-color);">Send us a Message</h3>
            <form method="POST" action="{% url 'contact' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required
                        placeholder="Enter your full name">
                </div>



                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" required
                        placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" class="form-control" required
                        placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>

        <div class="contact-info-map">
            <div style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.8rem; color: var(--secondary-color);">Visit Our Store
                </h3>
                <p style="margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-map-marker-alt" style="color: var(--primary-color);"></i>
                    <strong>Address:</strong> Singrauli, Madhya Pradesh
                </p>
                <p style="margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-phone-alt" style="color: var(--primary-color);"></i>
                    <strong>Phone:</strong> +91 88710 13023
                </p>
            </div>

            <div class="map-container">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115598.05602492987!2d82.5510626352033!3d24.1843187!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3986c7d377464ce7%3A0xe5a363a033af72eb!2sSingrauli%2C%20Madhya%20Pradesh!5e0!3m2!1sen!2sin!4v1707570412850!5m2!1sen!2sin"
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
